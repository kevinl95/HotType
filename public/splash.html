<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Hot Type</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reddit+Sans:wght@400;500;600;700;800&family=Reddit+Mono:wght@400;500;600&display=swap');
      :root { --orange:#ff4500; --ink:#1a1a1b; --muted:#8a8e93; --soft:#f6f7f8; --line:#ededef; }
      * { box-sizing:border-box; margin:0; padding:0; }
      body {
        font-family:'Reddit Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
        color:var(--ink); background:#fff;
        height:100vh; display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:14px; padding:20px;
        -webkit-font-smoothing:antialiased; text-align:center;
      }
      .mark { font-weight:800; font-size:30px; letter-spacing:-0.02em; }
      .mark span { color:var(--orange); }
      .hook { font-size:14.5px; color:var(--muted); font-weight:500; max-width:320px; line-height:1.45; }
      .teaser {
        display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
        min-height:26px; align-items:center;
      }
      .chip {
        font-size:12.5px; font-weight:500; color:var(--ink);
        background:var(--soft); border-radius:99px; padding:6px 12px;
      }
      .chip .mono { font-family:'Reddit Mono',ui-monospace,monospace; font-weight:600; }
      .chip.fire { color:var(--orange); }
      .chip.note { color:var(--orange); background:#fff4ee; }
      .start {
        font-family:inherit; font-weight:700; font-size:15px; color:#fff;
        background:var(--orange); border:0; border-radius:99px;
        padding:13px 30px; cursor:pointer; margin-top:4px;
        box-shadow:0 6px 18px rgba(255,69,0,.30); transition:transform .08s ease;
      }
      .start:active { transform:translateY(1px); }
      .foot { font-size:11.5px; color:#b3b7bb; font-weight:500; }
    </style>
  </head>
  <body>
    <div class="mark">hot<span>type</span></div>
    <p class="hook" id="hook">Hot Type builds a daily typing circuit from this subreddit's text posts. Fallback passages are marked if needed.</p>
    <div class="teaser" id="teaser"></div>
    <button class="start" id="start-button">Start typing →</button>
    <div class="foot">fresh posts every day</div>
    <script type="module" src="splash.js" defer></script>
  </body>
</html>
